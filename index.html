<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astreios — Schul-KI v7.9</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#06080f;--surface:#0d1117;--surface2:#161b27;--border:#1e2d45;
      --accent:#6366f1;--accent2:#818cf8;--text:#e2e8f0;--text-dim:#64748b;
      --success:#10b981;--danger:#ef4444;--gold:#f59e0b;--sw:240px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 20% 30%,rgba(99,102,241,.4) 0%,transparent 100%),radial-gradient(1px 1px at 80% 10%,rgba(129,140,248,.3) 0%,transparent 100%),radial-gradient(1px 1px at 50% 80%,rgba(99,102,241,.2) 0%,transparent 100%);pointer-events:none;z-index:0;}
    header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(13,17,23,.95);backdrop-filter:blur(10px);z-index:10;flex-shrink:0;}
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-star{font-size:22px;filter:drop-shadow(0 0 8px var(--accent));animation:pstar 3s ease-in-out infinite;}
    @keyframes pstar{0%,100%{filter:drop-shadow(0 0 8px var(--accent))}50%{filter:drop-shadow(0 0 16px var(--accent2))}}
    .logo-name{font-size:22px;font-weight:800;letter-spacing:.05em;background:linear-gradient(135deg,var(--accent2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo-tag{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-top:2px;}
    .btn-settings{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
    .btn-settings:hover{border-color:var(--accent);color:var(--text);}
    .main{display:flex;flex:1;overflow:hidden;position:relative;z-index:1;}
    .chat-sidebar{width:var(--sw);flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:rgba(10,13,20,.95);overflow:hidden;}
    .sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .sidebar-title{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;}
    .btn-new{background:var(--accent);border:none;color:#fff;width:28px;height:28px;border-radius:6px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .btn-new:hover{background:var(--accent2);box-shadow:0 0 10px var(--accent);}
    .chat-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px;}
    .chat-list::-webkit-scrollbar{width:3px;}
    .chat-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .chat-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s;min-width:0;}
    .chat-item:hover{background:var(--surface2);border-color:var(--border);}
    .chat-item.active{background:rgba(99,102,241,.12);border-color:var(--accent);}
    .ci-icon{font-size:13px;flex-shrink:0;color:var(--text-dim);}
    .chat-item.active .ci-icon{color:var(--accent2);}
    .ci-name{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-dim);}
    .chat-item.active .ci-name{color:var(--text);font-weight:600;}
    .ci-acts{display:none;gap:4px;flex-shrink:0;}
    .chat-item:hover .ci-acts{display:flex;}
    .ci-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px;}
    .ci-btn:hover{color:var(--text);background:var(--surface);}
    .ci-btn.del:hover{color:var(--danger);}
    .ci-rename{flex:1;background:var(--surface);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-size:13px;padding:2px 6px;font-family:'Syne',sans-serif;outline:none;min-width:0;}
    .chat-panel{flex:1;display:flex;flex-direction:column;background:rgba(13,17,23,.5);min-width:0;}
    .panel-header{padding:12px 20px;border-bottom:1px solid var(--border);font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);display:flex;align-items:center;justify-content:space-between;background:rgba(13,17,23,.3);}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 6px var(--success);display:inline-block;margin-right:6px;}
    .status-dot.busy{background:var(--gold);box-shadow:0 0 6px var(--gold);animation:blink 1s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .model-badge{font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:6px;color:var(--accent2);}
    .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
    .messages::-webkit-scrollbar{width:4px;}
    .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .msg{display:flex;gap:12px;animation:msgin .25s ease-out;max-width:85%;}
    @keyframes msgin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{align-self:flex-end;flex-direction:row-reverse;}
    .msg.assistant{align-self:flex-start;}
    .msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
    .msg.user .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));}
    .msg.assistant .msg-avatar{background:linear-gradient(135deg,#1e2d45,#2d3d5a);border:1px solid var(--border);}
    .msg-bubble{padding:12px 16px;border-radius:14px;font-size:14.5px;line-height:1.6;white-space:pre-wrap;}
    .msg.user .msg-bubble{background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;border-top-right-radius:2px;}
    .msg.assistant .msg-bubble{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-top-left-radius:2px;}
    .input-area{padding:16px 20px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;background:rgba(13,17,23,.8);}
    .input-row{display:flex;gap:10px;align-items:flex-end;}
    textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Syne',sans-serif;font-size:14.5px;padding:12px 16px;resize:none;min-height:46px;max-height:140px;outline:none;transition:border-color .2s;line-height:1.5;}
    textarea:focus{border-color:var(--accent);}
    .btn-send{background:linear-gradient(135deg,var(--accent),#4f46e5);border:none;border-radius:12px;color:#fff;width:46px;height:46px;font-size:18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .btn-send:hover{transform:scale(1.03);box-shadow:0 0 14px var(--accent);}
    .btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:520px;max-width:95vw;padding:26px;box-shadow:0 25px 80px rgba(0,0,0,.6);}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:4px;}
    .modal-sub{font-size:12px;color:var(--text-dim);margin-bottom:18px;font-family:'JetBrains Mono',monospace;}
    .fg{margin-bottom:14px;}
    .fl{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
    .fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px;outline:none;}
    .fi:focus{border-color:var(--accent);}
    .modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
    .btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;}
    .btn-save{background:linear-gradient(135deg,var(--accent),#4f46e5);border:none;color:#fff;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;}
    .footer{padding:8px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(13,17,23,.95);z-index:10;}
    .html-result{background:#0a0d14;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .html-result-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface2);}
    .html-result-label{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--accent2);}
    .html-result-actions{display:flex;gap:6px;}
    .btn-apply{background:var(--success);border:none;color:#fff;font-size:11px;font-family:'Syne',sans-serif;font-weight:600;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .2s;}
    .btn-apply:hover{filter:brightness(1.15);}
    .btn-dl{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-size:11px;font-family:'Syne',sans-serif;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
    .btn-dl:hover{border-color:var(--accent2);color:var(--text);}
    .html-result pre{font-family:'JetBrains Mono',monospace;font-size:12px;overflow-x:auto;max-height:260px;padding:12px;color:var(--text-dim);}
    @media(max-width:600px){.chat-sidebar{display:none;}}
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-star">&#10022;</div>
      <div>
        <div class="logo-name">ASTREIOS</div>
        <div class="logo-tag">Schul-KI &middot; v7.9 &middot; Gemini 2.0 Flash</div>
      </div>
    </div>
    <button class="btn-settings" onclick="openSettings()">&#9881; Settings</button>
  </header>

  <div class="main">
    <div class="chat-sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Gespräche</span>
        <button class="btn-new" onclick="newChat()" title="Neuer Chat">+</button>
      </div>
      <div class="chat-list" id="chatList"></div>
    </div>
    <div class="chat-panel">
      <div class="panel-header">
        <div><span class="status-dot" id="statusDot"></span><span id="statusText">Bereit</span></div>
        <div class="model-badge" id="modelBadge">gemini-2.0-flash</div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea id="userInput" placeholder="Tippe deine Frage... Oder '!html' um den App-Code zu bearbeiten!" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="btn-send" id="sendBtn" onclick="sendMessage()">&#10148;</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>&#169; Titus Wagner 2026 &mdash; Astreios v7.9 (Gemini 2.0 Flash + Featherless Backup)</span>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-title">&#9881; Einstellungen</div>
      <div class="modal-sub">API Keys werden nur lokal in deinem Browser gespeichert.</div>
      <div class="fg">
        <label class="fl">Google Gemini API Key (Hauptmodell)</label>
        <input type="password" class="fi" id="googleKeyInput" placeholder="AIzaSy...">
      </div>
      <div class="fg">
        <label class="fl">Featherless API Key (Backup)</label>
        <input type="password" class="fi" id="featherlessKeyInput" placeholder="fl-...">
      </div>
      <div class="fg">
        <label class="fl">Dein Name</label>
        <input type="text" class="fi" id="userNameInput" placeholder="z.B. Titus">
      </div>
      <div class="modal-acts">
        <button class="btn-cancel" onclick="closeSettings()">Abbrechen</button>
        <button class="btn-save" onclick="saveSettings()">&#10003; Speichern</button>
      </div>
    </div>
  </div>

  <script>
  // ================================================================
  // API Keys: direkt hier eintragen ODER ueber das Settings-Menue
  // ================================================================
  var GOOGLE_API_KEY      = localStorage.getItem('astreios-gkey') || "HIER_DEIN_GOOGLE_API_KEY";
  var FEATHERLESS_API_KEY = localStorage.getItem('astreios-fkey') || "HIER_DEIN_FEATHERLESS_API_KEY";
  // ================================================================

  var GEMINI_MODEL = "gemini-2.0-flash";
  var GEMINI_URL   = "https://generativelanguage.googleapis.com/v1beta/models/" + GEMINI_MODEL + ":generateContent?key=";

  var userName = localStorage.getItem('astreios-username') || '';
  var isGen = false;

  function loadChats(){ try{ return JSON.parse(localStorage.getItem('astreios-chats')||'[]'); }catch(e){ return []; } }
  function saveChats(c){ localStorage.setItem('astreios-chats',JSON.stringify(c)); }
  function newChatObj(){ return {id:Date.now().toString(36),name:'Neues Gespraech',messages:[]}; }

  var chats = loadChats();
  var activeId = localStorage.getItem('astreios-active')||null;
  if(!chats.find(function(c){return c.id===activeId;})) activeId=null;
  if(!chats.length){ var _fc=newChatObj(); chats.push(_fc); saveChats(chats); activeId=_fc.id; }
  if(!activeId) activeId=chats[0].id;

  function getChat(){ return chats.find(function(c){return c.id===activeId;}); }
  function newChat(){ var c=newChatObj(); chats.unshift(c); saveChats(chats); go(c.id); }
  function go(id){ activeId=id; localStorage.setItem('astreios-active',id); renderList(); renderMsgs(); }

  function delChat(id,e){
    e.stopPropagation();
    chats=chats.filter(function(c){return c.id!==id;});
    if(!chats.length){var fc=newChatObj();chats.push(fc);}
    saveChats(chats);
    if(activeId===id){activeId=chats[0].id;localStorage.setItem('astreios-active',activeId);}
    renderList(); renderMsgs();
  }

  function startRename(id,e){
    e.stopPropagation();
    var item=document.querySelector('.chat-item[data-id="'+id+'"]'); if(!item)return;
    var chat=chats.find(function(c){return c.id===id;});
    var el=item.querySelector('.ci-name');
    var inp=document.createElement('input'); inp.className='ci-rename'; inp.value=chat.name;
    el.replaceWith(inp); inp.focus(); inp.select();
    function done(){chat.name=inp.value.trim()||'Unbenannt';saveChats(chats);renderList();}
    inp.addEventListener('blur',done);
    inp.addEventListener('keydown',function(ev){if(ev.key==='Enter')inp.blur();});
  }

  function renderList(){
    var list=document.getElementById('chatList'); list.innerHTML='';
    chats.forEach(function(chat){
      var d=document.createElement('div');
      d.className='chat-item'+(chat.id===activeId?' active':'');
      d.dataset.id=chat.id;
      d.onclick=function(){go(chat.id);};
      d.innerHTML='<span class="ci-icon">&#128172;</span>'+
        '<span class="ci-name">'+esc(chat.name)+'</span>'+
        '<div class="ci-acts">'+
          '<button class="ci-btn" onclick="startRename(\''+chat.id+'\',event)" title="Umbenennen">&#9998;</button>'+
          '<button class="ci-btn del" onclick="delChat(\''+chat.id+'\',event)" title="Loeschen">&#10005;</button>'+
        '</div>';
      list.appendChild(d);
    });
  }

  function renderMsgs(){
    var box=document.getElementById('messages'); box.innerHTML='';
    var chat=getChat(); if(!chat)return;
    if(!chat.messages.length){
      var grName=userName?', '+esc(userName):'';
      var d=document.createElement('div'); d.className='msg assistant';
      d.innerHTML='<div class="msg-avatar">&#10022;</div><div class="msg-bubble">'+
        'Hi'+grName+'! Ich bin Astreios, dein Schul-KI-Kumpel.\n\n'+
        'Jetzt mit Gemini 2.0 Flash!\n\n'+
        '- Normaler Chat: Einfach losschreiben.\n'+
        '- HTML-Modus: Schreib !html vor deine Nachricht, um diese App zu bearbeiten.\n\n'+
        'Falls noch kein API Key eingetragen ist, bitte oben auf Settings klicken.</div>';
      box.appendChild(d);
    } else {
      chat.messages.forEach(function(m){appendMsgDOM(m.role,m.content,false);});
    }
    box.scrollTop=box.scrollHeight;
  }

  function appendMsgDOM(role,content,isHtml){
    var box=document.getElementById('messages');
    var d=document.createElement('div'); d.className='msg '+role;
    var bubbleInner;
    if(isHtml&&(content.includes('<!DOCTYPE html>')||content.includes('<html'))){
      // store code on a unique key so buttons can reference it
      var codeId='hc_'+Date.now();
      window[codeId]=content;
      bubbleInner=
        '<div class="html-result">'+
          '<div class="html-result-toolbar">'+
            '<span class="html-result-label">&#128196; HTML generiert</span>'+
            '<div class="html-result-actions">'+
              '<button class="btn-apply" onclick="applyHtml(\''+codeId+'\')">&#9654; Anwenden</button>'+
              '<button class="btn-dl" onclick="downloadHtml(\''+codeId+'\')">&#8615; Download</button>'+
            '</div>'+
          '</div>'+
          '<pre>'+esc(content.slice(0,1200))+(content.length>1200?'\n\n… ('+content.length+' Zeichen gesamt)':'')+'</pre>'+
        '</div>';
    } else {
      bubbleInner=esc(content);
    }
    d.innerHTML='<div class="msg-avatar">'+(role==='user'?'&#128100;':'&#10022;')+'</div>'+
      '<div class="msg-bubble">'+bubbleInner+'</div>';
    box.appendChild(d);
    box.scrollTop=box.scrollHeight;
  }

  function applyHtml(codeId){
    var code=window[codeId]; if(!code)return;
    document.open(); document.write(code); document.close();
  }

  function downloadHtml(codeId){
    var code=window[codeId]; if(!code)return;
    var blob=new Blob([code],{type:'text/html'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='astreios.html';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function setStatus(busy,txt){
    var dot=document.getElementById('statusDot');
    var st=document.getElementById('statusText');
    var btn=document.getElementById('sendBtn');
    if(dot) dot.className='status-dot'+(busy?' busy':'');
    if(st) st.textContent=txt;
    if(btn) btn.disabled=busy;
  }
  function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
  function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px';}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function stripFences(t){return t.replace(/^```(?:html)?\s*/i,'').replace(/```\s*$/,'').trim();}

  // ================================================================
  // SEND: Gemini zuerst, Featherless als Backup
  // ================================================================
  async function sendMessage(){
    if(isGen)return;
    var inp=document.getElementById('userInput');
    var prompt=inp.value.trim(); if(!prompt)return;
    inp.value=''; inp.style.height='auto';
    isGen=true;

    var chat=getChat();
    if(chat&&!chat.messages.length){
      chat.name=prompt.slice(0,28)+(prompt.length>28?'...':'');
      saveChats(chats); renderList();
    }

    var box=document.getElementById('messages');
    var uDiv=document.createElement('div'); uDiv.className='msg user';
    uDiv.innerHTML='<div class="msg-avatar">&#128100;</div><div class="msg-bubble">'+esc(prompt)+'</div>';
    box.appendChild(uDiv); box.scrollTop=box.scrollHeight;

    var isHtmlMode=prompt.toLowerCase().startsWith('!html');
    var systemPrompt;

    if(isHtmlMode){
      var currentCode=document.documentElement.outerHTML;
      systemPrompt=
        "Du bist ein Experte fuer Web-Entwicklung. Der Nutzer moechte den Code seiner App anpassen.\n"+
        "Hier ist der VOLLSTAENDIGE aktuelle Code:\n\n"+currentCode+"\n\n"+
        "REGELN:\n"+
        "1. Setze die Aenderung praezise um.\n"+
        "2. Antworte AUSSCHLIESSLICH mit dem kompletten HTML. Kein Text davor oder danach.\n"+
        "3. Beginne direkt mit <!DOCTYPE html> und ende mit </html>.\n"+
        "4. Behalte alle vorhandenen Funktionen bei.";
    } else {
      systemPrompt=
        "Du bist Astreios, ein hilfreicher, lockerer KI-Kumpel fuer Schueler.\n"+
        "Antworte immer direkt und verstaendlich auf Deutsch.\n";
      if(userName) systemPrompt+="Der Name des Nutzers ist "+userName+".\n";
    }

    var history=chat.messages.slice(-8);
    var replyText="";
    var usedModel="";

    // ---- STUFE 1: Gemini 2.0 Flash ----
    setStatus(true,'Gemini 2.0 Flash...');
    try {
      if(!GOOGLE_API_KEY||GOOGLE_API_KEY.startsWith('HIER_')){
        throw new Error("Kein Gemini API Key. Bitte in Settings eintragen.");
      }

      var geminiContents=[];
      history.forEach(function(m){
        geminiContents.push({role:m.role==='user'?'user':'model',parts:[{text:m.content}]});
      });
      geminiContents.push({role:'user',parts:[{text:prompt}]});

      var resp=await fetch(GEMINI_URL+GOOGLE_API_KEY,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          contents:geminiContents,
          systemInstruction:{parts:[{text:systemPrompt}]},
          generationConfig:{maxOutputTokens:8192,temperature:isHtmlMode?0.2:0.7}
        })
      });

      if(!resp.ok){
        var errJson=await resp.json().catch(function(){return {};});
        throw new Error("Gemini "+resp.status+": "+(errJson.error&&errJson.error.message||resp.statusText));
      }

      var data=await resp.json();
      replyText=data.candidates[0].content.parts[0].text.trim();
      if(isHtmlMode) replyText=stripFences(replyText);
      usedModel="gemini-2.0-flash";

    } catch(geminiErr){
      console.warn("Gemini fehlgeschlagen:",geminiErr.message);

      // ---- STUFE 2: Featherless Backup ----
      setStatus(true,'Backup: Featherless / Llama-70B...');
      try {
        if(!FEATHERLESS_API_KEY||FEATHERLESS_API_KEY.startsWith('HIER_')){
          throw new Error("Kein Featherless API Key. Bitte in Settings eintragen.");
        }

        var flMsgs=[{role:"system",content:systemPrompt}];
        history.forEach(function(m){flMsgs.push({role:m.role,content:m.content});});
        flMsgs.push({role:"user",content:prompt});

        var flResp=await fetch("https://api.featherless.ai/v1/chat/completions",{
          method:"POST",
          headers:{"Authorization":"Bearer "+FEATHERLESS_API_KEY,"Content-Type":"application/json"},
          body:JSON.stringify({
            model:"meta-llama/Meta-Llama-3.1-70B-Instruct",
            messages:flMsgs,
            temperature:isHtmlMode?0.2:0.7,
            max_tokens:4096
          })
        });

        if(!flResp.ok){
          var flJson=await flResp.json().catch(function(){return {};});
          throw new Error("Featherless "+flResp.status+": "+(flJson.error&&flJson.error.message||flResp.statusText));
        }

        var flData=await flResp.json();
        replyText=flData.choices[0].message.content.trim();
        if(isHtmlMode) replyText=stripFences(replyText);
        usedModel="featherless/llama-70b";

      } catch(flErr){
        console.error("Featherless fehlgeschlagen:",flErr.message);
        replyText="Verbindungsproblem\n\nWeder Gemini noch Featherless haben geantwortet.\n\nBitte pruefen:\n- API Key korrekt eingetragen? (Settings oben rechts)\n- Tageslimit erreicht?\n- Internetverbindung vorhanden?\n\nFehler: "+flErr.message;
        usedModel="(Fehler)";
      }
    }

    chat.messages.push({role:'user',content:prompt});
    chat.messages.push({role:'assistant',content:replyText});
    saveChats(chats);

    appendMsgDOM('assistant',replyText,isHtmlMode);

    var badge=document.getElementById('modelBadge');
    if(badge) badge.textContent=usedModel;

    setStatus(false,'Bereit');
    isGen=false;
  }

  function openSettings(){
    document.getElementById('googleKeyInput').value=GOOGLE_API_KEY.startsWith('HIER_')?'':GOOGLE_API_KEY;
    document.getElementById('featherlessKeyInput').value=FEATHERLESS_API_KEY.startsWith('HIER_')?'':FEATHERLESS_API_KEY;
    document.getElementById('userNameInput').value=userName;
    document.getElementById('settingsModal').classList.add('open');
  }
  function closeSettings(){document.getElementById('settingsModal').classList.remove('open');}
  function saveSettings(){
    var gk=document.getElementById('googleKeyInput').value.trim();
    var fk=document.getElementById('featherlessKeyInput').value.trim();
    var un=document.getElementById('userNameInput').value.trim();
    if(gk){GOOGLE_API_KEY=gk;localStorage.setItem('astreios-gkey',gk);}
    if(fk){FEATHERLESS_API_KEY=fk;localStorage.setItem('astreios-fkey',fk);}
    userName=un; localStorage.setItem('astreios-username',un);
    closeSettings(); renderMsgs();
  }

  renderList(); renderMsgs();
  </script>
</body>
</html>
